<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RxManager – Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-box">
    <h1>💊 RxManager</h1>
    
    <div class="auth-tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn" onclick="login()">Login</button>
      <p id="login-error" class="error"></p>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Dr. Jane Smith">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>I am a...</label>
        <select id="reg-role">
          <option value="patient">Patient</option>
          <option value="doctor">Doctor</option>
        </select>
      </div>
      <button class="btn" onclick="register()">Create Account</button>
      <p id="reg-error" class="error"></p>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000";

    function switchTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
      document.querySelectorAll('.tab-btn').forEach((b, i) => 
        b.classList.toggle('active', (i === 0) === (tab === 'login')));
    }

    async function login() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) return document.getElementById('login-error').textContent = data.detail;
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('role', data.role);
      localStorage.setItem('name', data.name);
      window.location.href = data.role === 'doctor' ? 'doctor.html' : 'patient.html';
    }

    async function register() {
      const body = {
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value,
        role: document.getElementById('reg-role').value
      };
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) return document.getElementById('reg-error').textContent = data.detail;
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('role', data.role);
      localStorage.setItem('name', data.name);
      window.location.href = data.role === 'doctor' ? 'doctor.html' : 'patient.html';
    }
  </script>
</body>
</html>
